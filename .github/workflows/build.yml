name: bluebuild
on:
  push:
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        uses: blue-build/github-action@v1.10
        with:
          recipe: recipes/recipe.yml
