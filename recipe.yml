---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: coldmania
description: "Coldmania OS: Hyprland Edition"
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: rpm-ostree
    install:
      - hyprland
      - waybar
      - wofi
      - alacritty
      - neofetch

  - type: flatpak
    install:
      - org.mozilla.firefox
      - com.github.tchx84.Flatseal
